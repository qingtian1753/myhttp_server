<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>学生管理系统 - 登录 / 注册</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">
  <div class="auth-bg auth-bg-1"></div>
  <div class="auth-bg auth-bg-2"></div>

  <div class="auth-shell premium-auth-shell">
    <section class="auth-brand premium-brand">
      <div class="brand-topline">Student Management Platform</div>
      <div class="brand-badge">SMS</div>
      <h1>学生管理系统</h1>
    </section>

    <section class="auth-card premium-auth-card">
      <div class="tabs premium-tabs">
        <button class="tab-btn active" data-tab="login">登录</button>
        <button class="tab-btn" data-tab="register">注册</button>
      </div>

      <form id="loginForm" class="tab-panel active auth-form-panel">
        <div class="panel-intro">
          <h2>欢迎回来</h2>
          <p>请输入用户名和密码进入系统</p>
        </div>

        <div class="form-item with-icon">
          <label for="loginUsername">用户名</label>
          <div class="input-shell">
            <span class="input-icon">👤</span>
            <input id="loginUsername" name="username" type="text" placeholder="请输入用户名" required />
          </div>
        </div>

        <div class="form-item with-icon">
          <label for="loginPassword">密码</label>
          <div class="input-shell">
            <span class="input-icon">🔒</span>
            <input id="loginPassword" name="password" type="password" placeholder="请输入密码" required />
          </div>
        </div>

        <button class="primary-btn glossy-btn full-width-btn" type="submit">立即登录</button>
      </form>

      <form id="registerForm" class="tab-panel auth-form-panel">
        <div class="panel-intro">
          <h2>创建账号</h2>
          <p>请设置用户名和不少于 6 位的密码</p>
        </div>

        <div class="form-item with-icon">
          <label for="registerUsername">用户名</label>
          <div class="input-shell">
            <span class="input-icon">🪪</span>
            <input id="registerUsername" name="username" type="text" placeholder="请输入用户名" required />
          </div>
        </div>

        <div class="form-item with-icon">
          <label for="registerPassword">密码</label>
          <div class="input-shell">
            <span class="input-icon">🔑</span>
            <input id="registerPassword" name="password" type="password" placeholder="请输入至少 6 位密码" required />
          </div>
        </div>

        <div class="form-item with-icon">
          <label for="confirmPassword">确认密码</label>
          <div class="input-shell">
            <span class="input-icon">✅</span>
            <input id="confirmPassword" name="confirmPassword" type="password" placeholder="请再次输入密码" required />
          </div>
        </div>

        <button class="primary-btn glossy-btn full-width-btn" type="submit">注册账号</button>
      </form>

      <p id="authMessage" class="form-message"></p>
    </section>
  </div>

  <script src="login.js"></script>
</body>
</html>
